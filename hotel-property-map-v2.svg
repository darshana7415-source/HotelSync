<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="1600" height="1000" fill="#f7fbfc"/>
  <rect x="36" y="36" width="1528" height="928" rx="22" fill="#ffffff" stroke="#bed4d8" stroke-width="4"/>
  <text x="80" y="96" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#12323a">Beach &amp; Bills Hotel - Wing / Floor Location Map</text>
