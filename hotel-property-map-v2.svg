      <text x="285" y="632" font-size="28" font-weight="500" fill="#52646b">New Wing first floor</text>

      <rect x="130" y="700" width="580" height="118" rx="16" fill="#dff2f4" stroke="#84bfc6" stroke-width="3"/>
